openapi: 3.1.0
info:
  title: Feedback API
  description: API documentation for Lets Grow application.
  version: v1
servers:
- url: http://localhost:8080
  description: Generated server url
security:
- bearerAuth: []
paths:
  /event/{eventId}:
    put:
      tags:
      - Events
      operationId: updateEvent
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventWrapperDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
      - Events
      operationId: deleteEvent
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /event/mark-as-seen/{eventId}:
    put:
      tags:
      - Events
      operationId: markEventAsSeen
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/mock-new-feedback-notification:
    put:
      tags:
      - Admin
      operationId: sendNotification
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationInput"
        required: true
      responses:
        "200":
          description: OK
          content: {}
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /account:
    put:
      tags:
      - Account
      operationId: modifyAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifyAccountInput"
        required: true
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
      - Account
      operationId: createAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountInput"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
      - Account
      operationId: deleteAccount
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /account/role:
    put:
      tags:
      - Account
      operationId: updateRole
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleInput"
        required: true
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /account/fcm-token:
    put:
      tags:
      - Account
      operationId: linkFCMTokenToAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkFCMTokenToAccountInput"
        required: true
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /feedback/submit:
    post:
      tags:
      - Feedback
      operationId: submitFeedback
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackInput"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitFeedbackResponseDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /feedback/start:
    post:
      tags:
      - Feedback
      operationId: startFeedbackSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartFeedbackSessionInput"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSessionDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /event:
    post:
      tags:
      - Events
      operationId: createEvent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventWrapperDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /event/join/{pinCode}:
    post:
      tags:
      - Events
      operationId: joinEvent
      parameters:
      - name: pinCode
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantEventDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/mock-id-token:
    post:
      tags:
      - Admin
      operationId: mockIdToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockIdTokenRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockTokenDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /account/logout:
    post:
      tags:
      - Account
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutInput"
        required: true
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /session:
    get:
      tags:
      - Session
      operationId: getSession
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /session/session-update/{feedbackSessionHash}:
    get:
      tags:
      - Session
      operationId: getUpdatedSession
      parameters:
      - name: feedbackSessionHash
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatedSessionResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /activity/mark-activity-as-seen:
    get:
      tags:
      - Activity
      operationId: markActivityAsSeen
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    EventInput:
      type: object
      properties:
        title:
          type: string
        agenda:
          type: string
        date:
          type: string
          format: date-time
        durationInMinutes:
          type: integer
          format: int32
        location:
          type: string
        invitedEmails:
          type: array
          items:
            type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionInput"
      required:
      - date
      - durationInMinutes
      - invitedEmails
      - questions
      - title
    QuestionInput:
      type: object
      properties:
        questionText:
          type: string
        feedbackType:
          type: string
          enum:
          - Emoji
          - Comment
          - ThumpsUpThumpsDown
          - Opinion
          - ZeroToTen
      required:
      - feedbackType
      - questionText
    EmojiQuestionFeedbackSummary:
      type: object
      properties:
        countVerySad:
          type: integer
          format: int32
        countSad:
          type: integer
          format: int32
        countHappy:
          type: integer
          format: int32
        countVeryHappy:
          type: integer
          format: int32
        percentageVerySad:
          type: number
          format: double
        percentageSad:
          type: number
          format: double
        percentageHappy:
          type: number
          format: double
        percentageVeryHappy:
          type: number
          format: double
      required:
      - countHappy
      - countSad
      - countVeryHappy
      - countVerySad
      - percentageHappy
      - percentageSad
      - percentageVeryHappy
      - percentageVerySad
    EventWrapperDto:
      type: object
      properties:
        event:
          $ref: "#/components/schemas/ManagerEventDto"
        recentlyUsedQuestions:
          type: array
          items:
            $ref: "#/components/schemas/RecentlyUsedQuestions"
      required:
      - event
      - recentlyUsedQuestions
    FeedbackEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        feedbackType:
          type: string
          enum:
          - Emoji
          - Comment
          - ThumpsUpThumpsDown
          - Opinion
          - ZeroToTen
        comment:
          type: string
        emoji:
          type: string
          enum:
          - VerySad
          - Sad
          - Happy
          - VeryHappy
        thumbsUpThumpsDown:
          type: string
          enum:
          - Up
          - Down
        opinion:
          type: string
          enum:
          - StronglyDisagree
          - Disagree
          - Neutral
          - Agree
          - StronglyAgree
        zeroToTen:
          type: integer
          format: int32
        questionId:
          type: string
          format: uuid
        participantId:
          type: string
        seenByManager:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
      - createdAt
      - feedbackType
      - id
      - questionId
      - seenByManager
    ManagerEventDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        agenda:
          type: string
        date:
          type: string
          format: date-time
        pinCode:
          type: string
        durationInMinutes:
          type: integer
          format: int32
        location:
          type: string
        calendarProvider:
          type: string
          enum:
          - GOOGLE
          - APPLE
          - MICROSOFT
          - ZOOM
        isDraft:
          type: boolean
        ownerInfo:
          $ref: "#/components/schemas/OwnerInfoDto"
        overallFeedbackSummary:
          $ref: "#/components/schemas/OverallFeedbackSummaryDto"
        invitedEmails:
          type: array
          items:
            type: string
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ParticipantSummaryDto"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ManagerQuestion"
      required:
      - date
      - durationInMinutes
      - id
      - invitedEmails
      - isDraft
      - ownerInfo
      - participants
      - questions
      - title
    ManagerQuestion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        questionText:
          type: string
        feedbackType:
          type: string
          enum:
          - Emoji
          - Comment
          - ThumpsUpThumpsDown
          - Opinion
          - ZeroToTen
        feedback:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackEntity"
        questionFeedbackSummary:
          $ref: "#/components/schemas/QuestionFeedbackSummaryDto"
      required:
      - feedback
      - feedbackType
      - id
      - questionText
    OpinionQuestionFeedbackSummary:
      type: object
      properties:
        countStronglyAgree:
          type: integer
          format: int32
        countAgree:
          type: integer
          format: int32
        countStronglyDisagree:
          type: integer
          format: int32
        countDisagree:
          type: integer
          format: int32
        percentageStronglyAgree:
          type: number
          format: double
        percentageAgree:
          type: number
          format: double
        percentageStronglyDisagree:
          type: number
          format: double
        percentageDisagree:
          type: number
          format: double
      required:
      - countAgree
      - countDisagree
      - countStronglyAgree
      - countStronglyDisagree
      - percentageAgree
      - percentageDisagree
      - percentageStronglyAgree
      - percentageStronglyDisagree
    OverallFeedbackCountStatsDto:
      type: object
      properties:
        verySadCount:
          type: integer
          format: int32
        sadCount:
          type: integer
          format: int32
        happyCount:
          type: integer
          format: int32
        veryHappyCount:
          type: integer
          format: int32
        commentsCount:
          type: integer
          format: int32
      required:
      - commentsCount
      - happyCount
      - sadCount
      - veryHappyCount
      - verySadCount
    OverallFeedbackSegmentationStatsDto:
      type: object
      properties:
        verySadPercentage:
          type: number
          format: double
        sadPercentage:
          type: number
          format: double
        happyPercentage:
          type: number
          format: double
        veryHappyPercentage:
          type: number
          format: double
      required:
      - happyPercentage
      - sadPercentage
      - veryHappyPercentage
      - verySadPercentage
    OverallFeedbackSummaryDto:
      type: object
      properties:
        segmentationStats:
          $ref: "#/components/schemas/OverallFeedbackSegmentationStatsDto"
        countStats:
          $ref: "#/components/schemas/OverallFeedbackCountStatsDto"
        unseenResponses:
          type: integer
          format: int32
        responses:
          type: integer
          format: int32
      required:
      - countStats
      - responses
      - segmentationStats
      - unseenResponses
    OwnerInfoDto:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
    ParticipantSummaryDto:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
    QuestionFeedbackSummaryDto:
      type: object
      properties:
        emojiQuestionFeedbackSummary:
          $ref: "#/components/schemas/EmojiQuestionFeedbackSummary"
        thumpsQuestionFeedbackSummary:
          $ref: "#/components/schemas/ThumpsQuestionFeedbackSummary"
        opinionQuestionFeedbackSummary:
          $ref: "#/components/schemas/OpinionQuestionFeedbackSummary"
        zeroToTenQuestionFeedbackSummary:
          $ref: "#/components/schemas/ZeroToTenQuestionFeedbackSummary"
    RecentlyUsedQuestions:
      type: object
      properties:
        questionText:
          type: string
        feedbackType:
          type: string
          enum:
          - Emoji
          - Comment
          - ThumpsUpThumpsDown
          - Opinion
          - ZeroToTen
        updatedAt:
          type: string
          format: date-time
      required:
      - feedbackType
      - questionText
      - updatedAt
    ThumpsQuestionFeedbackSummary:
      type: object
      properties:
        countUp:
          type: integer
          format: int32
        countDown:
          type: integer
          format: int32
        percentageUp:
          type: number
          format: double
        percentageDown:
          type: number
          format: double
      required:
      - countDown
      - countUp
      - percentageDown
      - percentageUp
    ZeroToTenQuestionFeedbackSummary:
      type: object
      properties:
        countValue0:
          type: integer
          format: int32
        countValue1:
          type: integer
          format: int32
        countValue2:
          type: integer
          format: int32
        countValue3:
          type: integer
          format: int32
        countValue4:
          type: integer
          format: int32
        countValue5:
          type: integer
          format: int32
        countValue6:
          type: integer
          format: int32
        countValue7:
          type: integer
          format: int32
        countValue8:
          type: integer
          format: int32
        countValue9:
          type: integer
          format: int32
        countValue10:
          type: integer
          format: int32
        percentageValue0:
          type: number
          format: double
        percentageValue1:
          type: number
          format: double
        percentageValue2:
          type: number
          format: double
        percentageValue3:
          type: number
          format: double
        percentageValue4:
          type: number
          format: double
        percentageValue5:
          type: number
          format: double
        percentageValue6:
          type: number
          format: double
        percentageValue7:
          type: number
          format: double
        percentageValue8:
          type: number
          format: double
        percentageValue9:
          type: number
          format: double
        percentageValue10:
          type: number
          format: double
      required:
      - countValue0
      - countValue1
      - countValue10
      - countValue2
      - countValue3
      - countValue4
      - countValue5
      - countValue6
      - countValue7
      - countValue8
      - countValue9
      - percentageValue0
      - percentageValue1
      - percentageValue10
      - percentageValue2
      - percentageValue3
      - percentageValue4
      - percentageValue5
      - percentageValue6
      - percentageValue7
      - percentageValue8
      - percentageValue9
    SendNotificationInput:
      type: object
      properties:
        fcmToken:
          type: string
        title:
          type: string
        newFeedback:
          type: integer
          format: int32
        eventId:
          type: string
          format: uuid
      required:
      - eventId
      - fcmToken
      - newFeedback
      - title
    ModifyAccountInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
    UpdateRoleInput:
      type: object
      properties:
        role:
          type: string
      required:
      - role
    LinkFCMTokenToAccountInput:
      type: object
      properties:
        fcmToken:
          type: string
      required:
      - fcmToken
    FeedbackInput:
      type: object
      properties:
        comment:
          type: string
        emoji:
          type: string
          enum:
          - VerySad
          - Sad
          - Happy
          - VeryHappy
        thumbsUpThumpsDown:
          type: string
          enum:
          - Up
          - Down
        opinion:
          type: string
          enum:
          - StronglyDisagree
          - Disagree
          - Neutral
          - Agree
          - StronglyAgree
        zeroToTen:
          type: integer
          format: int32
        questionId:
          type: string
          format: uuid
        feedbackType:
          type: string
          enum:
          - Emoji
          - Comment
          - ThumpsUpThumpsDown
          - Opinion
          - ZeroToTen
      required:
      - feedbackType
      - questionId
    SubmitFeedbackInput:
      type: object
      properties:
        feedback:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackInput"
        pinCode:
          type: string
      required:
      - feedback
      - pinCode
    ParticipantEventDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        agenda:
          type: string
        date:
          type: string
          format: date-time
        pinCode:
          type: string
        durationInMinutes:
          type: integer
          format: int32
        location:
          type: string
        createdFromMailListener:
          type: boolean
        ownerInfo:
          $ref: "#/components/schemas/OwnerInfoDto"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ParticipantQuestionDto"
        feedbackSubmited:
          type: boolean
        recentlyJoined:
          type: boolean
      required:
      - createdFromMailListener
      - date
      - durationInMinutes
      - feedbackSubmited
      - id
      - ownerInfo
      - questions
      - recentlyJoined
      - title
    ParticipantQuestionDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        questionText:
          type: string
        feedbackType:
          type: string
          enum:
          - Emoji
          - Comment
          - ThumpsUpThumpsDown
          - Opinion
          - ZeroToTen
      required:
      - feedbackType
      - id
      - questionText
    SubmitFeedbackResponseDto:
      type: object
      properties:
        shouldPresentRatingPrompt:
          type: boolean
        event:
          $ref: "#/components/schemas/ParticipantEventDto"
      required:
      - event
      - shouldPresentRatingPrompt
    StartFeedbackSessionInput:
      type: object
      properties:
        pinCode:
          type: string
      required:
      - pinCode
    FeedbackSessionDto:
      type: object
      properties:
        title:
          type: string
        agenda:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ParticipantQuestionDto"
        ownerInfo:
          $ref: "#/components/schemas/OwnerInfoDto"
        date:
          type: string
          format: date-time
      required:
      - date
      - ownerInfo
      - questions
      - title
    MockIdTokenRequestDto:
      type: object
      properties:
        role:
          type: string
        id:
          type: string
      required:
      - id
    MockTokenDto:
      type: object
      properties:
        firebaseResponse:
          $ref: "#/components/schemas/SignInFirebaseResponseDto"
        token:
          type: string
      required:
      - firebaseResponse
      - token
    SignInFirebaseResponseDto:
      type: object
      properties:
        idToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: string
      required:
      - expiresIn
      - idToken
      - refreshToken
    CreateAccountInput:
      type: object
      properties:
        requestedRole:
          type: string
        fcmToken:
          type: string
    AccountInfoDto:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
    ActivityDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        unseenTotal:
          type: integer
          format: int32
      required:
      - items
      - unseenTotal
    ActivityItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        eventTitle:
          type: string
        eventId:
          type: string
          format: uuid
        newFeedbackCount:
          type: integer
          format: int32
        seenByManager:
          type: boolean
      required:
      - date
      - eventId
      - eventTitle
      - id
      - newFeedbackCount
      - seenByManager
    ManagerDataDto:
      type: object
      properties:
        managerEvents:
          type: array
          items:
            $ref: "#/components/schemas/ManagerEventDto"
        activity:
          $ref: "#/components/schemas/ActivityDto"
        recentlyUsedQuestions:
          type: array
          items:
            $ref: "#/components/schemas/RecentlyUsedQuestions"
        feedbackSessionHash:
          type: string
          format: uuid
      required:
      - activity
      - feedbackSessionHash
      - managerEvents
      - recentlyUsedQuestions
    SessionDto:
      type: object
      properties:
        role:
          type: string
        accountInfo:
          $ref: "#/components/schemas/AccountInfoDto"
        participantEvents:
          type: array
          items:
            $ref: "#/components/schemas/ParticipantEventDto"
        managerData:
          $ref: "#/components/schemas/ManagerDataDto"
      required:
      - accountInfo
      - participantEvents
    LogoutInput:
      type: object
      properties:
        fcmToken:
          type: string
      required:
      - fcmToken
    UpdatedSessionResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/SessionDto"
    ApiError:
      properties:
        timestamp:
          type: string
        message:
          type: string
        domainCode:
          type: string
          enum:
          - FEEDBACK_ALREADY_SUBMITTED
          - EVENT_ALREADY_JOINED
          - CANNOT_JOIN_OWN_EVENT
          - CANNOT_GIVE_FEEDBACK_TO_SELF
          - PINCODE_NOT_FOUND
        exceptionType:
          type: string
        path:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      name: bearerAuth
      scheme: bearer
      bearerFormat: JWT
