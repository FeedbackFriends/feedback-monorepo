openapi: 3.1.0
info:
  title: Feedback API
  description: API documentation for Lets Grow application.
  version: v1
servers:
- url: http://localhost:18080
  description: Generated server url
security:
- bearerAuth: []
paths:
  /event/{eventId}:
    put:
      tags:
      - Events
      operationId: updateEvent
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackFlowDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
      - Events
      operationId: deleteEvent
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /event/mark-as-seen/{eventId}:
    put:
      tags:
      - Events
      operationId: markEventAsSeen
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/mock-new-feedback-notification:
    put:
      tags:
      - Admin
      operationId: sendNotification
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationInput"
        required: true
      responses:
        "200":
          description: OK
          content: {}
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /account:
    put:
      tags:
      - Account
      operationId: modifyAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifyAccountInput"
        required: true
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
      - Account
      operationId: createAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountInput"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
      - Account
      operationId: deleteAccount
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /account/role:
    put:
      tags:
      - Account
      operationId: updateRole
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleInput"
        required: true
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /account/fcm-token:
    put:
      tags:
      - Account
      operationId: linkFCMTokenToAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkFCMTokenToAccountInput"
        required: true
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /feedback/submit:
    post:
      tags:
      - Feedback
      operationId: submitFeedback
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackInput"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitFeedbackResponseDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /feedback/start:
    post:
      tags:
      - Feedback
      operationId: startFeedbackSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartFeedbackSessionInput"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSessionDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /event:
    post:
      tags:
      - Events
      operationId: createEvent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackFlowDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /event/join/{pinCode}:
    post:
      tags:
      - Events
      operationId: joinEvent
      parameters:
      - name: pinCode
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantEventDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /admin/mock-id-token:
    post:
      tags:
      - Admin
      operationId: mockIdToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockIdTokenRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockTokenDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /account/logout:
    post:
      tags:
      - Account
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutInput"
        required: true
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /bootstrap:
    get:
      tags:
      - Bootstrap
      operationId: getBootstrap
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapDto"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /bootstrap/bootstrap-update/{hash}:
    get:
      tags:
      - Bootstrap
      operationId: getBoostrapUpdate
      parameters:
      - name: hash
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatedSessionResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /activity/mark-activity-as-seen:
    get:
      tags:
      - Activity
      operationId: markActivityAsSeen
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    EventInput:
      type: object
      properties:
        title:
          type: string
        agenda:
          type: string
        date:
          type: string
          format: date-time
        durationInMinutes:
          type: integer
          format: int32
        location:
          type: string
        invitedEmails:
          type: array
          items:
            type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionInput"
      required:
      - date
      - durationInMinutes
      - invitedEmails
      - questions
      - title
    QuestionInput:
      type: object
      properties:
        questionText:
          type: string
        feedbackType:
          type: string
          enum:
          - Emoji
          - Comment
          - ThumpsUpThumpsDown
          - Opinion
          - ZeroToTen
      required:
      - feedbackType
      - questionText
    AutomationSettings:
      type: object
      properties:
        botEmail:
          type: string
        isActive:
          type: boolean
      required:
      - botEmail
      - isActive
    FeedbackFlowDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        owner:
          $ref: "#/components/schemas/OwnerDto"
        newFeedback:
          type: boolean
        analytics:
          $ref: "#/components/schemas/FlowAnalytics"
        insights:
          $ref: "#/components/schemas/FlowInsights"
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionDto"
        sessionSettings:
          $ref: "#/components/schemas/SessionSettings"
        currentQuestions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionDto"
      required:
      - analytics
      - currentQuestions
      - id
      - insights
      - newFeedback
      - owner
      - sessionSettings
      - sessions
      - title
    FlowAnalytics:
      type: object
      properties:
        averageRating:
          type: number
          format: double
        trendStatus:
          type: string
          enum:
          - IMPROVING
          - STABLE
          - NEEDS_ATTENTION
        lastSessionAt:
          type: string
          format: date-time
        ratingTrend:
          type: array
          items:
            $ref: "#/components/schemas/RatingPoint"
      required:
      - ratingTrend
    FlowInsights:
      type: object
      properties:
        summary:
          type: string
    OwnerDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
      required:
      - email
      - id
      - name
    QuestionDto:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
      required:
      - id
      - text
    QuestionSummaryDto:
      type: object
      properties:
        positives:
          type: array
          items:
            type: string
        improvements:
          type: array
          items:
            type: string
      required:
      - improvements
      - positives
    RatingPoint:
      type: object
      properties:
        value:
          type: number
          format: double
        timestamp:
          type: string
          format: date-time
      required:
      - timestamp
      - value
    RecurringSettings:
      type: object
      properties:
        frequency:
          type: string
          enum:
          - WEEKLY
          - MONTHLY
        dayOfWeek:
          type: string
          enum:
          - MONDAY
          - TUESDAY
          - WEDNESDAY
          - THURSDAY
          - FRIDAY
          - SATURDAY
          - SUNDAY
        dayOfMonth:
          type: integer
          format: int32
        time:
          type: string
      required:
      - frequency
      - time
    SessionDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        averageRating:
          type: number
          format: double
        ratingDelta:
          type: number
          format: double
        summary:
          type: string
        questionSummary:
          $ref: "#/components/schemas/QuestionSummaryDto"
        questionsSnapshot:
          type: array
          items:
            $ref: "#/components/schemas/QuestionDto"
      required:
      - id
      - questionsSnapshot
    SessionSettings:
      type: object
      properties:
        source:
          type: string
          enum:
          - MANUAL
          - RECURRING
          - CALENDAR_AUTOMATION
        recurring:
          $ref: "#/components/schemas/RecurringSettings"
        automation:
          $ref: "#/components/schemas/AutomationSettings"
      required:
      - source
    SendNotificationInput:
      type: object
      properties:
        fcmToken:
          type: string
        title:
          type: string
        newFeedback:
          type: integer
          format: int32
        eventId:
          type: string
          format: uuid
      required:
      - eventId
      - fcmToken
      - newFeedback
      - title
    ModifyAccountInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
    UpdateRoleInput:
      type: object
      properties:
        role:
          type: string
      required:
      - role
    LinkFCMTokenToAccountInput:
      type: object
      properties:
        fcmToken:
          type: string
      required:
      - fcmToken
    FeedbackInput:
      type: object
      properties:
        comment:
          type: string
        emoji:
          type: string
          enum:
          - VerySad
          - Sad
          - Happy
          - VeryHappy
        thumbsUpThumpsDown:
          type: string
          enum:
          - Up
          - Down
        opinion:
          type: string
          enum:
          - StronglyDisagree
          - Disagree
          - Neutral
          - Agree
          - StronglyAgree
        zeroToTen:
          type: integer
          format: int32
        questionId:
          type: string
          format: uuid
        feedbackType:
          type: string
          enum:
          - Emoji
          - Comment
          - ThumpsUpThumpsDown
          - Opinion
          - ZeroToTen
      required:
      - feedbackType
      - questionId
    SubmitFeedbackInput:
      type: object
      properties:
        feedback:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackInput"
        pinCode:
          type: string
      required:
      - feedback
      - pinCode
    OwnerInfoDto:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
    ParticipantEventDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        agenda:
          type: string
        date:
          type: string
          format: date-time
        pinCode:
          type: string
        durationInMinutes:
          type: integer
          format: int32
        location:
          type: string
        createdFromMailListener:
          type: boolean
        ownerInfo:
          $ref: "#/components/schemas/OwnerInfoDto"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ParticipantQuestionDto"
        feedbackSubmited:
          type: boolean
        recentlyJoined:
          type: boolean
      required:
      - createdFromMailListener
      - date
      - durationInMinutes
      - feedbackSubmited
      - id
      - ownerInfo
      - questions
      - recentlyJoined
      - title
    ParticipantQuestionDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        questionText:
          type: string
        feedbackType:
          type: string
          enum:
          - Emoji
          - Comment
          - ThumpsUpThumpsDown
          - Opinion
          - ZeroToTen
      required:
      - feedbackType
      - id
      - questionText
    SubmitFeedbackResponseDto:
      type: object
      properties:
        shouldPresentRatingPrompt:
          type: boolean
        event:
          $ref: "#/components/schemas/ParticipantEventDto"
      required:
      - event
      - shouldPresentRatingPrompt
    StartFeedbackSessionInput:
      type: object
      properties:
        pinCode:
          type: string
      required:
      - pinCode
    FeedbackSessionDto:
      type: object
      properties:
        title:
          type: string
        agenda:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ParticipantQuestionDto"
        ownerInfo:
          $ref: "#/components/schemas/OwnerInfoDto"
        date:
          type: string
          format: date-time
      required:
      - date
      - ownerInfo
      - questions
      - title
    MockIdTokenRequestDto:
      type: object
      properties:
        role:
          type: string
        id:
          type: string
      required:
      - id
    MockTokenDto:
      type: object
      properties:
        firebaseResponse:
          $ref: "#/components/schemas/SignInFirebaseResponseDto"
        token:
          type: string
      required:
      - firebaseResponse
      - token
    SignInFirebaseResponseDto:
      type: object
      properties:
        idToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: string
      required:
      - expiresIn
      - idToken
      - refreshToken
    CreateAccountInput:
      type: object
      properties:
        requestedRole:
          type: string
        fcmToken:
          type: string
    LogoutInput:
      type: object
      properties:
        fcmToken:
          type: string
      required:
      - fcmToken
    AccountInfoDto:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
    ActivityDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        unseenTotal:
          type: integer
          format: int32
      required:
      - items
      - unseenTotal
    ActivityItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        eventTitle:
          type: string
        eventId:
          type: string
          format: uuid
        newFeedbackCount:
          type: integer
          format: int32
        seenByManager:
          type: boolean
      required:
      - date
      - eventId
      - eventTitle
      - id
      - newFeedbackCount
      - seenByManager
    BootstrapDto:
      type: object
      properties:
        role:
          type: string
        accountInfo:
          $ref: "#/components/schemas/AccountInfoDto"
        managerData:
          $ref: "#/components/schemas/ManagerDataDto"
      required:
      - accountInfo
    ManagerDataDto:
      type: object
      properties:
        feedbackFlows:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackFlowDto"
        activity:
          $ref: "#/components/schemas/ActivityDto"
        sessionHash:
          type: string
          format: uuid
      required:
      - activity
      - feedbackFlows
      - sessionHash
    UpdatedSessionResponse:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/SessionDto"
    ApiError:
      properties:
        timestamp:
          type: string
        message:
          type: string
        domainCode:
          type: string
          enum:
          - FEEDBACK_ALREADY_SUBMITTED
          - EVENT_ALREADY_JOINED
          - CANNOT_JOIN_OWN_EVENT
          - CANNOT_GIVE_FEEDBACK_TO_SELF
          - PINCODE_NOT_FOUND
        exceptionType:
          type: string
        path:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      name: bearerAuth
      scheme: bearer
      bearerFormat: JWT
