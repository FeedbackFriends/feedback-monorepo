databaseChangeLog:
  - changeSet:
      id: 0001-initial-schema
      author: nicolaidam
      changes:
        - createTable:
            tableName: account
            columns:
              - column:
                  name: id
                  type: varchar(255)
                  constraints:
                    primaryKey: true
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: fcm_token
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: phone_number
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: rating_prompted
                  type: boolean
                  constraints:
                    nullable: false

        - createTable:
            tableName: event
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: agenda
                  type: varchar(255)
              - column:
                  name: date
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: duration_in_minutes
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: varchar(255)
              - column:
                  name: manager_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: event
            baseColumnNames: manager_id
            referencedTableName: account
            constraintName: fk_event_manager_id
            referencedColumnNames: id
        - createTable:
            tableName: event_participant
            columns:
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: participant_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: feedback_submitted
                  type: boolean
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: event_participant
            baseColumnNames: event_id
            referencedTableName: event
            referencedColumnNames: id
            constraintName: fk_event_participant_event_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: event_participant
            baseColumnNames: participant_id
            referencedTableName: account
            referencedColumnNames: id
            constraintName: fk_event_participant_participant_id
            onDelete: CASCADE
        - createTable:
            tableName: question
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: question_text
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: feedback_type
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: manager_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: index
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: question
            baseColumnNames: manager_id
            referencedTableName: account
            constraintName: fk_question_manager_id
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: question
            baseColumnNames: event_id
            referencedTableName: event
            referencedColumnNames: id
            constraintName: fk_question_event_id
            onDelete: CASCADE

        - createTable:
            tableName: pin_code
            columns:
              - column:
                  name: pin_code
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false

        - createTable:
            tableName: feedback
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: varchar(14)
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: emoji
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: thumbs_up_thumps_down
                  type: varchar(14)
                  constraints:
                    nullable: true
              - column:
                  name: one_to_ten
                  type: integer
                  constraints:
                    nullable: true
              - column:
                  name: opinion
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: question_id
                  type: uuid
              - column:
                  name: manager_id
                  type: varchar(255)
              - column:
                  name: is_new
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: participant_id
                  type: varchar(255)
                  constraints:
                    nullable: true
        - createTable:
            tableName: team
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: manager_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: team
            baseColumnNames: manager_id
            referencedTableName: account
            referencedColumnNames: id
            constraintName: fk_team_manager_id
            onDelete: CASCADE
        #feedback foreign keys
        - addForeignKeyConstraint:
            baseTableName: feedback
            baseColumnNames: question_id
            referencedTableName: question
            referencedColumnNames: id
            constraintName: fk_feedback_question_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: feedback
            baseColumnNames: manager_id
            referencedTableName: account
            referencedColumnNames: id
            constraintName: fk_feedback_manager_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: feedback
            baseColumnNames: participant_id
            referencedTableName: account
            referencedColumnNames: id
            constraintName: fk_feedback_participant_id
            onDelete: CASCADE
