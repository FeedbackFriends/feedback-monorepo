disabled_rules:
    - trailing_whitespace
    - redundant_string_enum_value
    - identifier_name
opt_in_rules:
    - empty_string
    - operator_usage_whitespace
    - colon
    - comma
    - trailing_newline
    - redundant_nil_coalescing
    - first_where
analyzer_rules:
    - unused_import
    - explicit_self
line_length:
    warning: 200
    error: 250
    ignores_function_declarations: true
    ignores_comments: true
    ignores_urls: true
function_body_length:
  warning: 200
  error: 300
type_body_length:
  warning: 300
  error: 400
function_parameter_count:
    warning: 6
    error: 8
file_length:
    warning: 1000
    error: 1500
    ignore_comment_only_lines: true
cyclomatic_complexity:
    warning: 15
    error: 25
nesting:
    type_level: 3
force_try: warning
force_cast: warning
reporter: "SwiftLint"
included:
  - App
  - Modules/Sources
excluded:
  - Modules/Tests
