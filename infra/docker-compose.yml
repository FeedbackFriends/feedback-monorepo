services:
  api:
    image: nicolaidam/feedback-api:${VERSION}
    container_name: api
    env_file:
      - ${ENV_FILE:?ENV_FILE must point to the root .env}
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      FIREBASE_CONFIG_PATH: ${FIREBASE_CONFIG_PATH}
      LOG_PATH: ${LOG_PATH}
    volumes:
      - logs:${LOG_PATH}
      - ${FIREBASE_CONFIG_FILE:?FIREBASE_CONFIG_FILE must point to root firebase_config.json}:${FIREBASE_CONFIG_PATH}:ro
    ports:
      - "${API_PORT}:8080"
    networks:
      - feedback-network
    restart: unless-stopped

  scheduler:
    image: nicolaidam/feedback-scheduler:${VERSION}
    container_name: scheduler
    env_file:
      - ${ENV_FILE:?ENV_FILE must point to the root .env}
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      FIREBASE_CONFIG_PATH: ${FIREBASE_CONFIG_PATH}
      ZOHO_ACCOUNT_ID: ${ZOHO_ACCOUNT_ID}
      ZOHO_FOLDER_ID: ${ZOHO_FOLDER_ID}
      ZOHO_OAUTH_REFRESH_TOKEN: ${ZOHO_OAUTH_REFRESH_TOKEN}
      ZOHO_CLIENT_ID: ${ZOHO_CLIENT_ID}
      ZOHO_CLIENT_SECRET: ${ZOHO_CLIENT_SECRET}
      LOG_PATH: ${LOG_PATH}
    volumes:
      - logs:${LOG_PATH}
      - ${FIREBASE_CONFIG_FILE:?FIREBASE_CONFIG_FILE must point to root firebase_config.json}:${FIREBASE_CONFIG_PATH}:ro
    networks:
      - feedback-network
    restart: unless-stopped

  web:
    image: nicolaidam/feedback-web:${VERSION}
    container_name: web
    ports:
      - "8081:80"
    networks:
      - feedback-network
    restart: unless-stopped
volumes:
  logs:

networks:
  feedback-network:
    external: true
