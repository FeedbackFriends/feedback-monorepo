services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "feedback"
      POSTGRES_USER: "feedback"
      POSTGRES_PASSWORD: "feedback"
    ports:
      - "5432:5432"
    volumes:
      - feedback-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedback -d feedback"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    pull_policy: never
    build:
      context: .
      dockerfile: backend/apps/api/Dockerfile
    environment:
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "feedback"
      POSTGRES_USER: "feedback"
      POSTGRES_PASSWORD: "feedback"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8090:8090"

  scheduler:
    pull_policy: never
    build:
      context: .
      dockerfile: backend/apps/scheduler/Dockerfile
    environment:
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "feedback"
      POSTGRES_USER: "feedback"
      POSTGRES_PASSWORD: "feedback"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8091:8091"

  web:
    pull_policy: never
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"

volumes:
  feedback-postgres:
  
