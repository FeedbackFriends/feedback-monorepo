server:
  port: 8080
  shutdown: graceful
  max-http-request-header-size: 16KB
spring:
  jpa:
    open-in-view: false
  liquibase:
    enabled: true
  exposed:
    show-sql: false
    generate-ddl: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:devDb;DATABASE_TO_UPPER=false}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:''}
  h2:
    console:
      enabled: true
      path: /h2-console
mail:
  host: ${IMAP_HOST:}
  port: ${IMAP_PORT:}
  username: ${IMAP_USERNAME:}
  password: ${IMAP_PASSWORD:}
  folder: ${IMAP_FOLDER:INBOX}
feedback:
  firebase-api-key: ${FIREBASE_API_KEY}
  firebase-config-path: ${FIREBASE_CONFIG_PATH}
  version: ${VERSION}
