server:
  port: 8080
  shutdown: graceful
  max-http-request-header-size: 16KB
management:
  server:
    port: 8090
  info:
    env:
      enabled: true
    java:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,beans,env
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
spring:
  jpa:
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-url: ${JWT_JWK_SET_URL}
          issuer-uri: ${JWT_ISSUER_URI}
  liquibase:
    enabled: true
  exposed:
    show-sql: ${SHOW_EXPOSED_SQL:false}
    generate-ddl: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:devDb;MODE=PostgreSQL;DATABASE_TO_UPPER=false}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:''}
  h2:
    console:
      enabled: true
      path: /h2-console
springdoc:
  swagger-ui:
    enabled: true
    path: /
  default-produces-media-type: application/json
feedback:
  firebase-api-key: ${FIREBASE_API_KEY}
  firebase-config-path: ${FIREBASE_CONFIG_PATH}

  mail:
    host: ${IMAP_HOST:}
    port: ${IMAP_PORT:993}
    username: ${IMAP_USERNAME:}
    password: ${IMAP_PASSWORD:}
    folder: ${IMAP_FOLDER:INBOX}
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  release: ${SENTRY_RELEASE:}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  send-default-pii: false
  in-app-packages: dk.example.feedback
