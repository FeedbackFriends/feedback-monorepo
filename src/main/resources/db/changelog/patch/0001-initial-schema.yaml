databaseChangeLog:
  - changeSet:
      id: 0001-initial-schema
      author: nicolaidam
      changes:
        - createTable:
            tableName: account
            columns:
              - column:
                  name: id
                  type: varchar(255)
                  constraints:
                    primaryKey: true
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: fcm_token
                  type: varchar(255)
                  constraints:
                      nullable: true
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: phone_number
                  type: varchar(255)
                  constraints:
                    nullable: true
#              - column:
#                  name: role
#                  type: varchar(255)
#                  constraints:
#                    nullable: true
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: rating_prompted
                  type: boolean
                  constraints:
                      nullable: false

        - createTable:
            tableName: event
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: agenda
                  type: varchar(255)
              - column:
                  name: date
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: duration_in_minutes
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: varchar(255)
              - column:
                  name: pin_code
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: manager_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: team_id
                  type: uuid
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: new_feedback
                  type: integer
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: event
            baseColumnNames: manager_id
            referencedTableName: account
            constraintName: fk_event_manager_id
            referencedColumnNames: id
