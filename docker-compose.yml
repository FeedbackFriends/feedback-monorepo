name: feedback

services:
  api:
    image: "nicolaidam/feedback-api:prod"
    platform: "linux/amd64"
    restart: unless-stopped
    environment:
      PORT: "8080"
      MANAGEMENT_SERVER_PORT: "8090"
      SPRING_DOC_API_DOCS_ENABLED: "true"
      SPRING_DOC_SWAGGER_UI_ENABLED: "true"
      POSTGRES_HOST:
      POSTGRES_PORT:
      POSTGRES_DB:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
      JWK_SET_URL: "${JWK_SET_URL:?Set JWK_SET_URL}"
      JWT_ISSUER_URI: "${JWT_ISSUER_URI:?Set JWT_ISSUER_URI}"
      FIREBASE_API_KEY: "${FIREBASE_API_KEY?Set FIREBASE_API_KEY}"
      FIREBASE_SERVICE_ACCOUNT_JSON_B64: "${FIREBASE_SERVICE_ACCOUNT_JSON_B64?Set FIREBASE_SERVICE_ACCOUNT_JSON_B64}"
      JAVA_OPTS: "-Xmx512m"
      JAVA_TOOL_OPTIONS: "-Xmx512m"
    expose:
      - "8080"
      - "8090"

  scheduler:
    image: "nicolaidam/feedback-scheduler:prod"
    platform: "linux/amd64"
    restart: unless-stopped
    environment:
      PORT: "8080"
      MANAGEMENT_SERVER_PORT: "8091"
      SPRING_LIQUIBASE_ENABLED: "true"
      POSTGRES_HOST:
      POSTGRES_PORT:
      POSTGRES_DB:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
      FIREBASE_API_KEY: "${FIREBASE_API_KEY?Set FIREBASE_API_KEY}"
      FIREBASE_SERVICE_ACCOUNT_JSON_B64: "${FIREBASE_SERVICE_ACCOUNT_JSON_B64?Set FIREBASE_SERVICE_ACCOUNT_JSON_B64}"
      ZOHO_ACCOUNT_ID: "${ZOHO_ACCOUNT_ID?Set ZOHO_ACCOUNT_ID}"
      ZOHO_FOLDER_ID: "${ZOHO_FOLDER_ID?Set ZOHO_FOLDER_ID}"
      ZOHO_MAILBOX_ADDRESS: "${ZOHO_MAILBOX_ADDRESS?Set ZOHO_MAILBOX_ADDRESS}"
      ZOHO_OAUTH_REFRESH_TOKEN: "${ZOHO_OAUTH_REFRESH_TOKEN?Set ZOHO_OAUTH_REFRESH_TOKEN}"
      ZOHO_CLIENT_ID: "${ZOHO_CLIENT_ID?Set ZOHO_CLIENT_ID}"
      ZOHO_CLIENT_SECRET: "${ZOHO_CLIENT_SECRET?Set ZOHO_CLIENT_SECRET}"
      JAVA_OPTS: "-Xmx512m"
      JAVA_TOOL_OPTIONS: "-Xmx512m"
    expose:
      - "8080"
      - "8091"

  web:
    image: "nicolaidam/feedback-web:prod"
    platform: "linux/amd64"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL: "${NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL:?Set NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL}"
      NEXT_PUBLIC_FIREBASE_API_KEY: "${NEXT_PUBLIC_FIREBASE_API_KEY?Set NEXT_PUBLIC_FIREBASE_API_KEY}"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN?Set NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "${NEXT_PUBLIC_FIREBASE_PROJECT_ID?Set NEXT_PUBLIC_FIREBASE_PROJECT_ID}"
      NEXT_PUBLIC_FIREBASE_APP_ID: "${NEXT_PUBLIC_FIREBASE_APP_ID?Set NEXT_PUBLIC_FIREBASE_APP_ID}"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET?Set NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID?Set NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}"
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID?Set NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}"
    depends_on:
      - api
    expose:
      - "3000"
