server:
  port: ${PORT:8080}
  shutdown: graceful
  max-http-request-header-size: 16KB
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:${PORT:8090}}
  info:
    env:
      enabled: true
    java:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,beans,env
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
spring:
  application:
    name: feedback-api
  jpa:
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-url: ${JWK_SET_URL}
          issuer-uri: ${JWT_ISSUER_URI}
  liquibase:
    enabled: true
  exposed:
    show-sql: ${SHOW_EXPOSED_SQL:false}
    generate-ddl: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:devDb;MODE=PostgreSQL;DATABASE_TO_UPPER=false}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:''}
  h2:
    console:
      enabled: true
      path: /h2-console
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /
  default-produces-media-type: application/json
feedback:
  firebase-api-key: ${FIREBASE_API_KEY}
  firebase-config-path: ${FIREBASE_CONFIG_PATH:}
logging:
  include-application-name: true
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    dk.example.feedback: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_SPRING_WEB:INFO}
    org.springframework.security: ${LOG_LEVEL_SPRING_SECURITY:INFO}
