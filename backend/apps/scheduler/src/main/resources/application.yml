server:
  port: 8080
  shutdown: graceful
  max-http-request-header-size: 16KB
management:
  server:
    port: 8091
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
spring:
  application:
    name: feedback-scheduler
  jpa:
    open-in-view: false
  liquibase:
    enabled: true
  exposed:
    show-sql: false
    generate-ddl: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:devDb;MODE=PostgreSQL;DATABASE_TO_UPPER=false}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:''}
  h2:
    console:
      enabled: true
      path: /h2-console
feedback:
  firebase-api-key: ${FIREBASE_API_KEY}
  firebase-config-path: ${FIREBASE_CONFIG_PATH}
  mail:
    enabled: ${ZOHO_MAIL_ENABLED:true}
    poll-interval-ms: ${ZOHO_POLL_INTERVAL_MS:10000}
    api-base-url: ${ZOHO_API_BASE_URL:https://mail.zoho.eu/api}
    account-id: ${ZOHO_ACCOUNT_ID:}
    folder-id: ${ZOHO_FOLDER_ID:}
    page-size: ${ZOHO_PAGE_SIZE:50}
    max-pages-per-poll: ${ZOHO_MAX_PAGES_PER_POLL:20}
    mailbox-address: ${ZOHO_MAILBOX_ADDRESS:}
    oauth:
      refresh-token: ${ZOHO_OAUTH_REFRESH_TOKEN:}
      client-id: ${ZOHO_CLIENT_ID:}
      client-secret: ${ZOHO_CLIENT_SECRET:}
      token-url: ${ZOHO_TOKEN_URL:https://accounts.zoho.eu/oauth/v2/token}
logging:
  include-application-name: true
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    dk.example.feedback: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_SPRING_WEB:INFO}
