databaseChangeLog:
  - changeSet:
      id: 0006-add-event-invite
      author: codex
      changes:
        - createTable:
            tableName: event_invite
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: event_invite
            baseColumnNames: event_id
            referencedTableName: event
            referencedColumnNames: id
            constraintName: fk_event_invite_event_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: event_invite
            baseColumnNames: account_id
            referencedTableName: account
            referencedColumnNames: id
            constraintName: fk_event_invite_account_id
            onDelete: SET NULL
        - addUniqueConstraint:
            tableName: event_invite
            columnNames: event_id, email
            constraintName: uk_event_invite_event_email

