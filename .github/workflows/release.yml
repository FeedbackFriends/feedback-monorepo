name: Release Artifacts 🚀

on:
  workflow_run:
    workflows: ["CI ✅"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest

    env:
      BUILD_NUMBER: ${{ github.event.workflow_run.run_number || github.run_number }}
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.SOURCE_SHA }}

      - name: Compute versions
        run: |
          CALVER_DATE="$(date -u +'%Y.%m.%d')"
          VERSION="${CALVER_DATE}.${BUILD_NUMBER}"
          RELEASE_TAG="rel-${VERSION}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: Set up JDK environment
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Generate OpenAPI spec
        env:
          SPRING_PROFILES_ACTIVE: openapi
        run: |
          ./gradlew :api:generateOpenApiDocs --no-configuration-cache -Pversion=${VERSION}
        working-directory: backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish backend images with Jib
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          ./gradlew :api:jib :scheduler:jib --no-configuration-cache -Pversion=${VERSION} -Djib.to.tags=prod
        working-directory: backend

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
            NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL=${{ vars.NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL }}
          push: true
          tags: |
            nicolaidam/feedback-web:${{ env.VERSION }}
            nicolaidam/feedback-web:prod

      - name: Create and Push Git Tag
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force origin

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "Git tag ${RELEASE_TAG} already exists on origin; skipping creation."
          else
            git tag -a "${RELEASE_TAG}" -m "Release ${VERSION} (${SOURCE_SHA})"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists; uploading OpenAPI asset with --clobber."
            gh release upload "${RELEASE_TAG}" backend/apps/api/build/openapi.yaml --clobber
          else
            gh release create "${RELEASE_TAG}" \
              backend/apps/api/build/openapi.yaml \
              --generate-notes \
              --title "Release ${VERSION}"
          fi

      - name: Trigger Coolify deployment
        env:
          BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          RESOURCE_UUID: ${{ secrets.COOLIFY_RESOURCE_UUID }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_URL }}
          IMAGE_PLATFORM: ${{ vars.COOLIFY_IMAGE_PLATFORM || 'linux/arm64' }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail

          sanitize_secret() {
            printf '%s' "$1" \
              | tr -d '\r\n' \
              | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
                    -e 's/^"//' -e 's/"$//' \
                    -e "s/^'//" -e "s/'$//"
          }

          BASE_URL="$(sanitize_secret "${BASE_URL:-}")"
          RESOURCE_UUID="$(sanitize_secret "${RESOURCE_UUID:-}")"
          TOKEN="$(sanitize_secret "${TOKEN:-}")"
          if [[ "$TOKEN" =~ ^[Bb]earer[[:space:]]+(.+)$ ]]; then
            TOKEN="${BASH_REMATCH[1]}"
          fi
          if [[ "$TOKEN" =~ ^[Tt]oken[[:space:]]+(.+)$ ]]; then
            TOKEN="${BASH_REMATCH[1]}"
          fi

          [[ -n "$BASE_URL" ]] || { echo "COOLIFY_BASE_URL is empty."; exit 1; }
          [[ -n "$RESOURCE_UUID" ]] || { echo "COOLIFY_RESOURCE_UUID is empty."; exit 1; }
          [[ -n "$TOKEN" ]] || { echo "COOLIFY_TOKEN is empty."; exit 1; }

          echo "::add-mask::$TOKEN"
          ENV_URL="${BASE_URL%/}/api/v1/applications/${RESOURCE_UUID}/envs"
          ENV_BULK_URL="${ENV_URL}/bulk"
          API_URL="${BASE_URL%/}/api/v1/deploy"
          echo "Triggering Coolify deployment for RESOURCE_UUID=${RESOURCE_UUID}"

          list_envs() {
            curl --silent --show-error \
              -H "Authorization: Bearer ${TOKEN}" \
              "$ENV_URL"
          }

          create_env() {
            local key="$1"
            local value="$2"
            local is_multiline="${3:-false}"
            local is_literal="${4:-false}"
            curl --silent --show-error \
              --request POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$(jq -cn \
                --arg key "$key" \
                --arg value "$value" \
                --argjson is_multiline "$is_multiline" \
                --argjson is_literal "$is_literal" \
                '{key: $key, value: $value, is_preview: false, is_literal: $is_literal, is_multiline: $is_multiline, is_shown_once: false}')" \
              "$ENV_URL" > /dev/null
          }

          ensure_env_exists() {
            local key="$1"
            local value="$2"
            local is_multiline="${3:-false}"
            local is_literal="${4:-false}"
            if ! list_envs | jq -e --arg key "$key" '.[] | select(.key == $key and .is_preview == false)' > /dev/null; then
              echo "Creating Coolify env ${key}"
              create_env "$key" "$value" "$is_multiline" "$is_literal"
            fi
          }

          ensure_env_exists "FEEDBACK_IMAGE_TAG" "${VERSION}"
          ensure_env_exists "FEEDBACK_IMAGE_PLATFORM" "${IMAGE_PLATFORM}"
          if [[ -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]]; then
            ensure_env_exists "FIREBASE_SERVICE_ACCOUNT_JSON" "${FIREBASE_SERVICE_ACCOUNT_JSON}" true true
          fi

          echo "Updating Coolify deploy envs for release ${VERSION}"
          curl --silent --show-error \
            --request PATCH \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$(jq -cn \
              --arg tag "${VERSION}" \
              --arg platform "${IMAGE_PLATFORM}" \
              --arg firebase_service_account_json "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" \
              '{data: (
                [
                  {key: "FEEDBACK_IMAGE_TAG", value: $tag, is_preview: false, is_literal: false, is_multiline: false, is_shown_once: false},
                  {key: "FEEDBACK_IMAGE_PLATFORM", value: $platform, is_preview: false, is_literal: false, is_multiline: false, is_shown_once: false}
                ] +
                (if $firebase_service_account_json != "" then
                  [
                    {key: "FIREBASE_SERVICE_ACCOUNT_JSON", value: $firebase_service_account_json, is_preview: false, is_literal: true, is_multiline: true, is_shown_once: false}
                  ]
                else
                  []
                end)
              )}')" \
            "$ENV_BULK_URL" > /dev/null

          RESPONSE_FILE="$(mktemp)"
          run_deploy_request() {
            local authorization_value="$1"
            curl --silent --show-error \
              --output "$RESPONSE_FILE" \
              --write-out "%{http_code}" \
              --get "$API_URL" \
              -H "Authorization: ${authorization_value}" \
              --data-urlencode "uuid=${RESOURCE_UUID}" || true
          }

          HTTP_STATUS="$(run_deploy_request "Bearer ${TOKEN}")"
          echo "Coolify deploy response status (bearer): ${HTTP_STATUS}"
          cat "$RESPONSE_FILE" || true

          if [[ "$HTTP_STATUS" == "401" ]]; then
            echo "Retrying Coolify deploy with raw token Authorization format."
            HTTP_STATUS="$(run_deploy_request "${TOKEN}")"
            echo "Coolify deploy response status (raw token): ${HTTP_STATUS}"
            cat "$RESPONSE_FILE" || true
          fi

          if [[ "$HTTP_STATUS" == "401" ]]; then
            echo "Retrying Coolify deploy with Token-prefixed Authorization format."
            HTTP_STATUS="$(run_deploy_request "Token ${TOKEN}")"
            echo "Coolify deploy response status (token prefix): ${HTTP_STATUS}"
            cat "$RESPONSE_FILE" || true
          fi

          rm -f "$RESPONSE_FILE"

          if [[ "$HTTP_STATUS" =~ ^2 ]]; then
            exit 0
          fi

          DEPLOY_WEBHOOK="$(sanitize_secret "${DEPLOY_WEBHOOK:-}")"
          if [[ "$HTTP_STATUS" == "401" && -n "$DEPLOY_WEBHOOK" ]]; then
            echo "API authentication failed. Falling back to Coolify deploy webhook."
            WEBHOOK_STATUS="$(
              curl --silent --show-error \
                --output /dev/null \
                --write-out "%{http_code}" \
                "$DEPLOY_WEBHOOK" || true
            )"
            echo "Coolify deploy webhook status: ${WEBHOOK_STATUS}"
            [[ "$WEBHOOK_STATUS" =~ ^2 ]] && exit 0
            echo "Coolify deploy webhook fallback failed with status ${WEBHOOK_STATUS}."
          fi

          echo "Coolify deployment trigger failed with status ${HTTP_STATUS}."
          exit 1
