name: Release Artifacts 🚀

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute versions
        run: |
          CALVER_DATE="$(date -u +'%Y.%m.%d')"
          VERSION="${CALVER_DATE}.${BUILD_NUMBER}"
          RELEASE_TAG="rel-${VERSION}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: Set up JDK environment
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Generate OpenAPI spec
        env:
          SPRING_PROFILES_ACTIVE: openapi
        run: |
          ./gradlew :api:generateOpenApiDocs --no-configuration-cache -Pversion=${VERSION}
        working-directory: backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and publish backend images with Jib
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          ./gradlew :api:jib :scheduler:jib --no-configuration-cache -Pversion=${VERSION}
        working-directory: backend

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
            NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL=${{ vars.NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL }}
          push: true
          tags: |
            nicolaidam/feedback-web:${{ env.VERSION }}

      - name: Create and Push Git Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ env.RELEASE_TAG }}" -m "Release ${{ env.VERSION }} (${GITHUB_SHA})"
          git push origin "${{ env.RELEASE_TAG }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            backend/apps/api/build/openapi.yaml \
            --generate-notes \
            --title "Release ${{ env.VERSION }}"

      - name: Update APP_VERSION and deploy in Coolify
        env:
          BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          RESOURCE_UUID: ${{ secrets.COOLIFY_RESOURCE_UUID }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          echo "::add-mask::$TOKEN"

          echo "Updating Coolify APP_VERSION=${VERSION}"
          curl --fail --silent --show-error \
            -X PATCH "$BASE_URL/api/v1/services/$RESOURCE_UUID/envs/bulk" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "data": [
              {
                "key": "APP_VERSION",
                "value": "${VERSION}",
                "is_literal": false,
                "is_multiline": false,
                "is_shown_once": false
              }
            ]
          }
          EOF

          echo "Triggering Coolify deployment for VERSION=${VERSION}"
          curl --fail --silent --show-error "$DEPLOY_WEBHOOK"