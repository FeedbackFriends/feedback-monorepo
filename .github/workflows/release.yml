name: Release Artifacts 🚀

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute versions
        run: |
          BASE_VERSION="${BUILD_NUMBER}"
          SHORT_SHA=${GITHUB_SHA:0:7}
          FULL_VERSION="${BASE_VERSION}-${SHORT_SHA}"
          # Keep Docker tags aligned with release versions for traceability.
          DOCKER_TAG="${FULL_VERSION}"
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_ENV
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV

      - name: Set up JDK environment
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Install Render CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/render-oss/cli/refs/heads/main/bin/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate Render Blueprint
        run: render blueprints validate render.yaml

      - name: Generate OpenAPI spec
        env:
          VERSION: ${{ env.FULL_VERSION }}
          SPRING_PROFILES_ACTIVE: openapi
        run: |
          ./gradlew :api:generateOpenApiDocs --no-configuration-cache -Pversion=${VERSION}
        working-directory: backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/apps/api/Dockerfile
          push: true
          tags: nicolaidam/feedback-api:${{ env.DOCKER_TAG }}

      - name: Build and publish scheduler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/apps/scheduler/Dockerfile
          push: true
          tags: nicolaidam/feedback-scheduler:${{ env.DOCKER_TAG }}

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
            NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL=${{ vars.NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL }}
          push: true
          tags: nicolaidam/feedback-web:${{ env.DOCKER_TAG }}

      - name: Create and Push Git Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ env.FULL_VERSION }}" -m "Release ${{ env.FULL_VERSION }}"
          git push origin "${{ env.FULL_VERSION }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.FULL_VERSION }}" \
            backend/apps/api/build/openapi.yaml \
            --generate-notes \
            --title "Release ${{ env.FULL_VERSION }}"
