name: Release Artifacts 🚀

on:
  workflow_run:
    workflows: ["CI ✅"]
    types: [completed]
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest

    env:
      BUILD_NUMBER: ${{ github.event.workflow_run.run_number }}
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.SOURCE_SHA }}

      - name: Compute versions
        run: |
          CALVER_DATE="$(date -u +'%Y.%m.%d')"
          VERSION="${CALVER_DATE}.${BUILD_NUMBER}"
          RELEASE_TAG="rel-${VERSION}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: Set up JDK environment
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Generate OpenAPI spec
        env:
          SPRING_PROFILES_ACTIVE: openapi
        run: |
          ./gradlew :api:generateOpenApiDocs --no-configuration-cache -Pversion=${VERSION}
        working-directory: backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and publish backend images with Jib
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          ./gradlew :api:jib :scheduler:jib --no-configuration-cache -Pversion=${VERSION} -Djib.to.tags=prod
        working-directory: backend

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
            NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL=${{ vars.NEXT_PUBLIC_LETSGROW_EARLY_ACCESS_URL }}
          push: true
          tags: |
            nicolaidam/feedback-web:${{ env.VERSION }}
            nicolaidam/feedback-web:prod

      - name: Create and Push Git Tag
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force origin

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "Git tag ${RELEASE_TAG} already exists on origin; skipping creation."
          else
            git tag -a "${RELEASE_TAG}" -m "Release ${VERSION} (${SOURCE_SHA})"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists; uploading OpenAPI asset with --clobber."
            gh release upload "${RELEASE_TAG}" backend/apps/api/build/openapi.yaml --clobber
          else
            gh release create "${RELEASE_TAG}" \
              backend/apps/api/build/openapi.yaml \
              --generate-notes \
              --title "Release ${VERSION}"
          fi

      - name: Trigger Coolify deployment
        env:
          BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          RESOURCE_UUID: ${{ secrets.COOLIFY_RESOURCE_UUID }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          set -euo pipefail

          echo "::add-mask::$TOKEN"
          echo "Triggering Coolify deployment for RESOURCE_UUID=${RESOURCE_UUID} with tag=prod"
          curl --fail --silent --show-error \
            -G "${BASE_URL%/}/api/v1/deploy" \
            -H "Authorization: Bearer $TOKEN" \
            --data-urlencode "uuid=${RESOURCE_UUID}" \
            --data-urlencode "tag=prod"
