name: Release Artifacts 🚀

on:
  workflow_run:
    workflows: ["CI ✅"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest

    env:
      BUILD_NUMBER: ${{ github.event.workflow_run.run_number || github.run_number }}
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.SOURCE_SHA }}

      - name: Compute versions
        run: |
          CALVER_DATE="$(date -u +'%Y.%d.%m')"
          VERSION="${CALVER_DATE}-${BUILD_NUMBER}"
          RELEASE_TAG="rel-${VERSION}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: Set up JDK environment
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Generate OpenAPI spec
        env:
          SPRING_PROFILES_ACTIVE: openapi
        run: |
          ./gradlew :api:generateOpenApiDocs --no-configuration-cache -Pversion=${VERSION}
        working-directory: backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish backend images with Jib
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          ./gradlew :api:jib :scheduler:jib --no-configuration-cache -Pversion=${VERSION} -Djib.to.tags=prod
        working-directory: backend

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=feedback-web
          cache-to: type=gha,mode=max,scope=feedback-web
          push: true
          tags: |
            nicolaidam/feedback-web:${{ env.VERSION }}
            nicolaidam/feedback-web:prod

      - name: Create and Push Git Tag
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "Release ${VERSION} (${SOURCE_SHA})"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release create "${RELEASE_TAG}" \
            backend/apps/api/build/openapi.yaml \
            --generate-notes \
            --title "Release ${VERSION}"

      - name: Trigger Coolify deployment
        env:
          BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          RESOURCE_UUID: ${{ secrets.COOLIFY_RESOURCE_UUID }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          set -euo pipefail

          [[ -n "${BASE_URL:-}" ]] || { echo "COOLIFY_BASE_URL is empty."; exit 1; }
          [[ -n "${RESOURCE_UUID:-}" ]] || { echo "COOLIFY_RESOURCE_UUID is empty."; exit 1; }
          [[ -n "${TOKEN:-}" ]] || { echo "COOLIFY_TOKEN is empty."; exit 1; }

          echo "::add-mask::$TOKEN"
          API_URL="${BASE_URL%/}/api/v1/deploy"
          echo "Triggering Coolify deployment for RESOURCE_UUID=${RESOURCE_UUID}"

          curl --fail --silent --show-error \
            --get "$API_URL" \
            -H "Authorization: Bearer ${TOKEN}" \
            --data-urlencode "uuid=${RESOURCE_UUID}"
