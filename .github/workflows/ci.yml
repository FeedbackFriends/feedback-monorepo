name: CI ✅

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK environment
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test and build backend
        run: |
          ./gradlew clean build
        working-directory: backend

      - name: Sync committed OpenAPI contract
        env:
          SPRING_PROFILES_ACTIVE: openapi
        run: |
          ./gradlew syncOpenApiSpec --no-configuration-cache
        working-directory: backend

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Generate frontend API types
        run: npm run generate:api-types
        working-directory: web

      - name: Verify committed API artifacts are up to date
        run: git diff --exit-code -- contracts/openapi/feedback-api.yaml web/src/lib/api/generated/openapi.ts

      - name: Lint and build web
        run: |
          npm run lint
          npm run build
        working-directory: web
