name: Generate OpenAPI Spec and Build Docker Image

on:
  push:
    tags:
      - '*'

jobs:
  build-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name as VERSION
        id: extract-version
        run: echo "VERSION=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate OpenAPI spec
        run: ./gradlew generateOpenApiDocs -Pversion=${{ env.VERSION }}
        env:
          VERSION: "${{ env.VERSION }}"

      - name: Print OpenAPI YAML file content
        run: cat build/openapi.yaml

      - name: Build Docker image with Jib
        run: ./gradlew jib --image=nicolaidam/feedback:${{ env.VERSION }}
        env:
          DOCKER_USERNAME: "${{ secrets.DOCKER_USERNAME }}"
          DOCKER_PASSWORD: "${{ secrets.DOCKER_PASSWORD }}"
