name: Deploy

on:
  release:
    types: [ created ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Release Tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          echo "Deploying tag: $TAG"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Deploy to Debian server using password
        run: |
          echo "Deploying tag ${{ env.TAG }} to Debian server"

          # Using SSH with password authentication
          sshpass -p "${{ secrets.DEBIAN_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEBIAN_USER }}@${{ secrets.DEBIAN_IP }} << EOF
          set -e
          echo "Pulling and running Docker image"
          ./run-docker.sh nicolaidam/feedback:${{ env.TAG }}
          EOF
        env:
          DEBIAN_IP: "${{ secrets.DEBIAN_IP }}"
          DEBIAN_USER: "${{ secrets.DEBIAN_USER }}"
          DEBIAN_PASSWORD: "${{ secrets.DEBIAN_PASSWORD }}"
          TAG: "${{ env.TAG }}"

      - name: Set as Latest Release (Only for Release Trigger)
        if: github.event_name == 'release'
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.FEEDBACK_GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.release.tag_name }} \
            -d '{"make_latest": true}'
