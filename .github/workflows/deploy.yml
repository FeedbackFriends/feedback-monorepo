name: Release to Debian Server

on:
  workflow_run:
    workflows:
      - Build Docker Image # Name of the triggering workflow
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Docker image tag from triggering workflow
        run: |
          # Extract the tag from the triggering workflow
          TAG=${{ github.event.workflow_run.head_commit.message }}
          echo "Extracted tag: $TAG"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Deploy to Debian server
        run: |
          echo "Deploying tag ${{ env.TAG }} to Debian server"

          # SSH into the Debian server and run the deployment script
          ssh -o StrictHostKeyChecking=no -i "${{ secrets.SSH_PRIVATE_KEY }}" ${{ secrets.DEBIAN_USER }}@${{ secrets.DEBIAN_IP }} << EOF
          set -e
          echo "Pulling and running Docker image"
          ./run-docker.sh ${{ env.TAG }}
          EOF
        env:
          DEBIAN_IP: "${{ secrets.DEBIAN_IP }}"
          DEBIAN_USER: "${{ secrets.DEBIAN_USER }}"
          SSH_PRIVATE_KEY: "${{ secrets.SSH_PRIVATE_KEY }}"

      - name: Create GitHub Release
        id: create-release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.TAG }}
          release_name: Release ${{ env.TAG }}
          body: |
            Deployed Docker image tagged as ${{ env.TAG }} to the Debian server.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Set as Latest Release
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.id }} \
            -d '{"make_latest": true}'
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
