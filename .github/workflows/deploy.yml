name: Deploy

on:
  workflow_dispatch:
    inputs:
      selected_tag:
        description: "Select the tag to deploy"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate input tag
        run: |
          echo "Selected tag: ${{ github.event.inputs.selected_tag }}"
          echo "TAG=${{ github.event.inputs.selected_tag }}" >> $GITHUB_ENV

      - name: Deploy to Debian server
        run: |
          echo "Deploying tag ${{ env.TAG }} to Debian server"

          # SSH into the Debian server and run the deployment script
          ssh -o StrictHostKeyChecking=no -i "${{ secrets.SSH_PRIVATE_KEY }}" ${{ secrets.DEBIAN_USER }}@${{ secrets.DEBIAN_IP }} << EOF
          set -e
          echo "Pulling and running Docker image"
          ./run-docker.sh ${{ env.TAG }}
          EOF
        env:
          DEBIAN_IP: "${{ secrets.DEBIAN_IP }}"
          DEBIAN_USER: "${{ secrets.DEBIAN_USER }}"
          SSH_PRIVATE_KEY: "${{ secrets.SSH_PRIVATE_KEY }}"
          TAG: "${{ env.TAG }}"

      - name: Set as Latest Release
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.inputs.selected_tag }} \
            -d '{"make_latest": true}'
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
