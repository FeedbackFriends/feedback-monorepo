name: Deploy Web 🚀

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy-web:
    runs-on: ubuntu-latest

    env:
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute versions
        run: |
          BASE_VERSION="${BUILD_NUMBER}"
          SHORT_SHA=${GITHUB_SHA:0:7}
          FULL_VERSION="${BASE_VERSION}-${SHORT_SHA}"
          DOCKER_TAG="${FULL_VERSION}"
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and publish web image
        env:
          DOCKER_TAG: ${{ env.DOCKER_TAG }}
        run: |
          infra/scripts/build-and-push-web.sh

      - name: Deploy web to Debian server
        env:
          DOCKER_TAG: ${{ env.DOCKER_TAG }}
          WEB_DOCKER_TAG: ${{ env.DOCKER_TAG }}
          DEPLOY_SERVICES: web
          FULL_DEPLOY: "0"
          REMOTE_USER: ${{ secrets.DEBIAN_USER }}
          REMOTE_HOST: ${{ secrets.DEBIAN_IP }}
          DEBIAN_PASSWORD: ${{ secrets.DEBIAN_PASSWORD }}
        run: |
          infra/scripts/deploy-remote.sh
