name: Update Feedback OpenAPI

on:
  push:
    branches:
      - main

jobs:
  update-openapi-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feedback-api repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Clone feedback-openapi repository
        run: |
          git clone https://github.com/FeedbackFriends/feedback-openapi.git
          cd feedback-openapi
          git checkout main

      - name: Modify a file to trigger a commit
        run: |
          cd feedback-openapi
          echo "Random change: $(date)" >> test.txt
          git add test.txt
          git commit -m "Automated update from feedback-api [$(date)]"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/FeedbackFriends/feedback-openapi.git main
