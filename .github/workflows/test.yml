name: Update Feedback OpenAPI

on:
  push:
    branches:
      - main

jobs:
  update-openapi-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feedback-api repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Avoids fetching full history for faster performance

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Clone feedback-openapi repository
        run: |
          git clone https://x-access-token:${{ secrets.FEEDBACK_OPENAPI_PAT }}@github.com/FeedbackFriends/feedback-openapi.git
          cd feedback-openapi
          git checkout main

      - name: Modify a file to trigger a commit
        run: |
          set -e  # Ensures the script exits if any command fails
          cd feedback-openapi
          echo "Random change: $(date)" >> test.txt
          git add test.txt
          git commit -m "Automated update from feedback-api [$(date)]"

      - name: Push changes
        run: |
          cd feedback-openapi
          git push https://x-access-token:${{ secrets.FEEDBACK_OPENAPI_PAT }}@github.com/FeedbackFriends/feedback-openapi.git main
