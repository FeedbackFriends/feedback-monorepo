name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type of version increment (major, minor, patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version
        id: get-current-version
        run: |
          git fetch --tags
          CURRENT_VERSION=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "0.0.0")
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: calculate-version
        run: |
          VERSION_TYPE=${{ github.event.inputs.version_type }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ env.CURRENT_VERSION }}"
          if [ "$VERSION_TYPE" = "patch" ]; then
            PATCH=$((PATCH + 1))
          elif [ "$VERSION_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$VERSION_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          fi
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Calculated new version: $NEW_VERSION"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate OpenAPI spec
        run: ./gradlew generateOpenApiDocs -Pversion=${{ env.NEW_VERSION }}
        env:
          VERSION: "${{ env.NEW_VERSION }}"
          
      - name: Push OpenAPI to `feedback-openapi`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Start the Spring Boot application in the background
          ./gradlew bootRun &
          APP_PID=$!

          # Wait for the application to be ready
          echo "Waiting for OpenAPI spec to be available..."
          for i in {1..15}; do
            if curl --fail http://localhost:8080/v3/api-docs.yaml -o openapi.yml; then
              echo "OpenAPI spec downloaded successfully."
              break
            fi
            echo "Retrying in 5 seconds..."
            sleep 5
          done

          # Stop the application after retrieving the spec
          kill $APP_PID || true

          # Checkout the `feedback-openapi` repository
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/FeedbackFriends/feedback-openapi.git feedback-openapi
          cd feedback-openapi

          # Move OpenAPI spec into the repository
          mv ../openapi.yml .

          # Check for changes before committing
          git add openapi.yml
          if git diff --cached --exit-code; then
            echo "No changes to OpenAPI spec. Skipping commit."
          else
            git commit -m "Update OpenAPI spec for v${{ env.NEW_VERSION }}"
            git push origin main
          fi

          # Create and push tag if there was a commit
          if [ "$(git tag -l "v${{ env.NEW_VERSION }}")" == "" ]; then
            git tag "v${{ env.NEW_VERSION }}"
            git push origin "v${{ env.NEW_VERSION }}"
          fi

      - name: Build Docker image with Jib
        run: ./gradlew jib --image=nicolaidam/feedback:${{ env.NEW_VERSION }}
        env:
          DOCKER_USERNAME: "${{ secrets.DOCKER_USERNAME }}"
          DOCKER_PASSWORD: "${{ secrets.DOCKER_PASSWORD }}"

      - name: Create and push new tag
        if: success() && steps.check-tag.outcome != 'skipped'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ env.NEW_VERSION }}
          git push origin ${{ env.NEW_VERSION }}
