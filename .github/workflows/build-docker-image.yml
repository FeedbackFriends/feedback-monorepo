name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type of version increment (major, minor, patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  id-token: write
  issues: write
  discussions: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version
        id: get-current-version
        run: |
          git fetch --tags
          CURRENT_VERSION=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: calculate-version
        run: |
          VERSION_TYPE=${{ github.event.inputs.version_type }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ env.CURRENT_VERSION }}"
          if [ "$VERSION_TYPE" = "patch" ]; then
            PATCH=$((PATCH + 1))
          elif [ "$VERSION_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$VERSION_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          fi
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Calculated new version: $NEW_VERSION"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate OpenAPI spec and push openapi.yaml to feedback-openapi
        env:
          VERSION: ${{ env.NEW_VERSION }}
        run: |
          ./gradlew :api:generateOpenApiDocs -Pversion=${{ env.NEW_VERSION }}          
          ABS_OPENAPI_YAML="$(pwd)/apps/api/build/openapi.yaml"

          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${{ secrets.FEEDBACK_OPENAPI_PAT }}@github.com/FeedbackFriends/feedback-openapi.git feedback-openapi
          cd feedback-openapi

          # Move OpenAPI spec into the repository
          cp "$ABS_OPENAPI_YAML" ./openapi.yaml

          # Ensure Git identity is set inside the cloned repo
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # Add and commit changes
          git add openapi.yaml
          git commit -m "Update OpenAPI ${{ env.NEW_VERSION }}"
          git push origin main
      - name: Build Docker image with Jib
        run: ./gradlew :api:jib --image=nicolaidam/feedback:${{ env.NEW_VERSION }}
        env:
          DOCKER_USERNAME: "${{ secrets.DOCKER_USERNAME }}"
          DOCKER_PASSWORD: "${{ secrets.DOCKER_PASSWORD }}"

      - name: Create and push new tag
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get latest commit SHA
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_URL="https://github.com/FeedbackFriends/feedback-api/commit/$COMMIT_SHA"

          # Create tag with commit message
          git tag -a ${{ env.NEW_VERSION }} -m "Release ${{ env.NEW_VERSION }} - Commit: $COMMIT_URL"
          git push origin ${{ env.NEW_VERSION }}
