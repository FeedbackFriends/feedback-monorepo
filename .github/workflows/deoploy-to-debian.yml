name: Release to Debian Server

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag of the Docker image to release'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate input tag
        run: |
          if [ -z "${{ github.event.inputs.tag }}" ]; then
            echo "Error: Tag input is required."
            exit 1
          fi
          echo "Using tag: ${{ github.event.inputs.tag }}"

      - name: Deploy to Debian server
        run: |
          echo "Deploying tag ${{ github.event.inputs.tag }} to Debian server"

          # SSH into the Debian server and run the deployment script
          ssh -o StrictHostKeyChecking=no -i "${{ secrets.SSH_PRIVATE_KEY }}" ${{ secrets.DEBIAN_USER }}@${{ secrets.DEBIAN_IP }} << EOF
          set -e
          echo "Pulling and running Docker image"
          ./run-docker.sh ${{ github.event.inputs.tag }}
          EOF
        env:
          DEBIAN_IP: "${{ secrets.DEBIAN_IP }}"
          DEBIAN_USER: "${{ secrets.DEBIAN_USER }}"
          SSH_PRIVATE_KEY: "${{ secrets.SSH_PRIVATE_KEY }}"

      - name: Create GitHub Release
        id: create-release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          release_name: Release ${{ github.event.inputs.tag }}
          body: |
            Deployed Docker image tagged as ${{ github.event.inputs.tag }} to the Debian server.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Set as Latest Release
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.id }} \
            -d '{"make_latest": true}'
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
