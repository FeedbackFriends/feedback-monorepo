name: Deploy 🚀

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute FULL_VERSION
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          FULL_VERSION="${BUILD_NUMBER}-${SHORT_SHA}"
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV

      - name: Set up JDK environment
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Update OpenAPI and sync with feedback-openapi repo
        env:
          VERSION: ${{ env.FULL_VERSION }}
        run: |
          ./gradlew :api:generateOpenApiDocs -Pversion=${VERSION}

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${{ secrets.FEEDBACK_OPENAPI_PAT }}@github.com/FeedbackFriends/feedback-openapi.git feedback-openapi
          cp apps/api/build/openapi.yaml feedback-openapi/openapi.yaml
          cd feedback-openapi

          git add openapi.yaml
          if git diff --cached --quiet; then
            echo "No changes detected in OpenAPI spec."
          else
            git commit -m "Update OpenAPI spec for version ${VERSION}"
            git push origin main
          fi

      - name: Build and publish Docker images with Jib
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          VERSION: ${{ env.FULL_VERSION }}
        run: |
          ./gradlew :api:jib 
          ./gradlew :scheduler:jib 

      - name: Deploy to Debian server
        run: |
          echo "Deploying version ${{ env.FULL_VERSION }} to Debian server"
          sshpass -p "${{ secrets.DEBIAN_PASSWORD }}" scp -o StrictHostKeyChecking=no \
            docker-compose.yml ${{ secrets.DEBIAN_USER }}@${{ secrets.DEBIAN_IP }}:/tmp/docker-compose.yml
          sshpass -p "${{ secrets.DEBIAN_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ secrets.DEBIAN_USER }}@${{ secrets.DEBIAN_IP }} << EOF
            set -e
            sudo mv /tmp/docker-compose.yml /home/debian/config/docker-compose.yml
            cd /home/debian/config
            sudo sed -i "s/^VERSION=.*/VERSION=${{ env.FULL_VERSION }}/" .env
            docker image prune -af
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d --remove-orphans
            docker image prune -f
          EOF

      - name: Create and Push Git Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ env.FULL_VERSION }}" -m "Release ${FULL_VERSION}"
          git push origin "${{ env.FULL_VERSION }}"

      - name: Create GitHub Release
        run: |
          API_JSON=$(jq -n \
            --arg tag_name "${{ env.FULL_VERSION }}" \
            --arg name "Release ${{ env.FULL_VERSION }}" \
            --arg body "🚀 New release of the API and Scheduler." \
            '{ tag_name: $tag_name, name: $name, body: $body, draft: false, prerelease: false }')

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$API_JSON" \
            "https://api.github.com/repos/${{ github.repository }}/releases"
