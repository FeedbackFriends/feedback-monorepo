name: Build and Push Docker Image with Jib

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Set up Java
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Decode and write Firebase Config to a file
    - name: Setup Firebase Config
      run: echo "${{ secrets.FIREBASE_CONFIG }}" > app/FIREBASE_CONFIG.json

    # 4. Build and Push with Jib
    - name: Build and Push Docker Image
      run: ./gradlew jibDockerBuild --image=my-docker-repo/my-image:latest
      env:
        FIREBASE_CONFIG_PATH: "app/resources/firebase_config.json"
