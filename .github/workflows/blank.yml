name: Build and Push Docker Image with Jib

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create and prepare config directory
      run: |
        mkdir -p src/main/jib/config
        echo "${{ secrets.FIREBASE_CONFIG }}" | base64 -d > src/main/jib/config/firebase_config.json

    - name: Validate Firebase config (optional debugging)
      run: |
        echo "Decoded Firebase Config Debug Output:"
        cat src/main/jib/config/firebase_config.json | jq .
        
    - name: Build Docker image with Jib
      run: ./gradlew jib --image=nicolaidam/feedback:1.0.28
      env:
        DOCKER_USERNAME: "${{ secrets.DOCKER_USERNAME }}"
        DOCKER_PASSWORD: "${{ secrets.DOCKER_PASSWORD }}"

