name: Build and Push Docker Image with Jib

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create config directory
      run: mkdir -p config

    - name: Decode and write Firebase Config to a file in config directory
      run: |
        echo "${{ secrets.FIREBASE_CONFIG }}" > config/firebase_config.json

    # 5. Authenticate Docker Hub
    #- name: Authenticate Docker Hub
    #  run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login --username "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build docker image with Jib and push to docker hub
      run: ./gradlew jib --image=my-docker-repo/my-image:latest
      env:
        FIREBASE_CONFIG_PATH: "config/firebase_config.json"
        DOCKER_USERNAME: "nicolaidam"
        DOCKER_PASSWORD: "dckr_pat_T_N2ZxKYNxQDbn0WaQ_NepfD64c"
