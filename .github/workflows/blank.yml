name: Build and Push Docker Image with Jib

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create and prepare config directory
      run: |
        mkdir -p src/main/jib/config
        printf '%s' "${{ secrets.FIREBASE_CONFIG }}" > src/main/jib/config/firebase_config.json

    - name: Build Docker image with Jib
      run: ./gradlew jib --image=nicolaidam/feedback:1.0.24
      env:
        JIB_EXTRA_DIRECTORIES_PATH: "${{ github.workspace }}/config"
        DOCKER_USERNAME: "${{ secrets.DOCKER_USERNAME }}"
        DOCKER_PASSWORD: "${{ secrets.DOCKER_PASSWORD }}"
        FIREBASE_CONFIG_PATH: "config/firebase_config.json"

